services:
  sookshma:
    image: aatmaj9/timi:2.0
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile_timi
    container_name: auv
    working_dir: /workspaces/mavlab
    user: "mavlab"
    runtime: nvidia
    privileged: true
    network_mode: host
    shm_size: "2g"
    ipc: host
    pid: host
    stdin_open: true
    tty: true
    group_add:
      - dialout
      - video
      - plugdev
      - render
      - audio
      - "104"
      - "44"
    device_cgroup_rules:
      - 'c 166:* rmw'   # ttyACM*
      - 'c 188:* rmw'   # ttyUSB*
      - 'c 195:* rmw'   # nvidia devices
      - 'c 104:* rmw'   # DRI render nodes
      - 'c 81:* rmw'    # video4linux (v4l) devices
    environment:
      - DISPLAY= $DISPLAY
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///workspaces/mavlab/.devcontainer/cyclonedds.xml
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    volumes:
      - ..:/workspaces/mavlab
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /tmp/argus_socket:/tmp/argus_socket

  # Run rosbridge persistently (avoid GUI pkill/start churn).
  rosbridge:
    image: aatmaj9/timi:1.0
    restart: unless-stopped
    container_name: auv_rosbridge
    working_dir: /workspaces/mavlab
    user: "mavlab"
    privileged: true
    network_mode: host
    ipc: host
    pid: host
    stdin_open: true
    tty: true
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///workspaces/mavlab/.devcontainer/cyclonedds.xml
    volumes:
      - ..:/workspaces/mavlab
    command: bash -ic "sros2 && scode && ros2 run rosbridge_server rosbridge_websocket --ros-args -p max_message_size:=10000000"