
services:
  sonarview:
    image: nicknothom/sonarview:1.14.70
    container_name: sonarview
    network_mode: host
    restart: unless-stopped
    privileged: true
    group_add:
      - dialout
    volumes:
      - ${SONARVIEW_USERDATA:-/home/timi/SonarView}:/userdata
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - ENABLE_OS3D=false

# Started with the AUV stack:
# docker compose -p auv -f docker-compose.yml -f docker-compose.<lan|wifi>.yml -f docker-compose.sonarview.yml up -d
